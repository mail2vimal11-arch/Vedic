version: "3.8"

services:
  vedic-app:
    build: .
    container_name: vedic-astrology
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - FLASK_ENV=production
      - GUNICORN_WORKERS=4
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - chart-output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  chart-output:
